name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Structure tests
  # Validates that every agent and skill has all required files in the right
  # places. This is the highest-value gate: a missing plugin.json or SKILL.md
  # silently breaks install for every user who pulls that agent or skill.
  # ---------------------------------------------------------------------------
  validate-structure:
    name: Validate structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run structure tests
        run: python -m pytest tests/test_structure.py -v
      - name: Run agent compliance tests
        run: python -m pytest tests/test_agent_compliance.py -v
      - name: Run skill compliance tests
        run: python -m pytest tests/test_skill_compliance.py -v

  # ---------------------------------------------------------------------------
  # Job 2: Hook tests
  # Validates JS syntax, exit-code contracts, and source-level invariants for
  # all three worktree hooks and bump-version.py. Node.js is pre-installed on
  # ubuntu-latest; no extra install needed.
  # ---------------------------------------------------------------------------
  test-hooks:
    name: Test hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run hook tests
        run: python -m pytest tests/test_hooks.py -v

  # ---------------------------------------------------------------------------
  # Job 3: Shell script linting
  # All setup.sh files are linted at WARNING severity. Errors in setup scripts
  # silently fail for end users who run them — shellcheck catches the common
  # pitfalls (unquoted vars, pipefail gaps) before they reach anyone.
  # Worktrees are excluded — they are copies of the same files, not distinct.
  # ---------------------------------------------------------------------------
  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: find . -name "setup.sh" -not -path "./.git/*" -not -path "./.claude/*" | xargs shellcheck -S warning

  # ---------------------------------------------------------------------------
  # Job 4: Agent tests (matrix)
  # Runs per-agent test suites for agents with real Python functionality.
  # Each agent uses uv to install its deps (including the shared lib/uiux
  # package via editable path dep) and runs its own tests/.
  #
  # Add an agent to the matrix when it gains a test_*.py with substantive tests.
  # ---------------------------------------------------------------------------
  agent-tests:
    name: "Agent tests (${{ matrix.agent }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [touch, form, pitch, prism, draft, surge, lens]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Run agent tests
        working-directory: team/${{ matrix.agent }}/scripts
        run: |
          uv sync --quiet
          uv run pytest ../tests/ -v
